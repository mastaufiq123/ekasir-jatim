<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - E-KASIR JATIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 flex min-h-screen">
    <aside class="w-64 bg-blue-900 text-white p-8 space-y-8 hidden md:block">
        <h1 class="text-2xl font-black italic">ADMIN PANEL</h1>
        <nav class="space-y-4 font-bold text-blue-200">
            <button onclick="showSection('inv')" class="block hover:text-white">📦 Master Barang</button>
            <button onclick="showSection('rep')" class="block hover:text-white">📈 Laporan Multi-Outlet</button>
            <button onclick="showSection('cert')" class="block hover:text-white">🎓 Sertifikat Siswa</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="rep" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black text-gray-800 tracking-tighter">DATA TRANSAKSI REAL-TIME</h2>
                <button onclick="exportKeExcel()" class="bg-green-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg">📥 EXCEL REPORT</button>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500">
                    <p class="text-gray-400 font-bold text-xs uppercase">Omzet Unit Produksi (Sekolah)</p>
                    <h3 id="omzetSekolah" class="text-3xl font-black text-blue-900">Rp 0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-orange-500">
                    <p class="text-gray-400 font-bold text-xs uppercase">Omzet UMKM Alumni</p>
                    <h3 id="omzetAlumni" class="text-3xl font-black text-orange-600">Rp 0</h3>
                </div>
            </div>
        </div>

        <div id="cert" class="mt-12 bg-blue-50 p-8 rounded-3xl border-2 border-dashed border-blue-300">
            <h3 class="font-black text-xl text-blue-900 mb-4">🎓 Generator Sertifikat Kompetensi Siswa</h3>
            <p class="text-sm text-blue-700 mb-6 font-medium leading-relaxed">Fitur ini merangkum total jam kerja dan transaksi yang dilakukan siswa selama praktik kasir sebagai Portofolio Lulusan SMK.</p>
            <div class="flex gap-4">
                <input type="email" id="emailSiswa" placeholder="Email Siswa" class="flex-1 p-4 rounded-2xl border-none shadow-sm">
                <button onclick="generatePortofolio()" class="bg-blue-900 text-white px-8 py-4 rounded-2xl font-bold">CETAK PORTOFOLIO</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {apiKey: "AIzaSyDxE_Obnz5ajGPLb1mOWROjE07klq_wfXo",
  authDomain: "e-kasir-jatim.firebaseapp.com",
  databaseURL: "https://e-kasir-jatim-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "e-kasir-jatim",
  storageBucket: "e-kasir-jatim.firebasestorage.app",
  messagingSenderId: "1076293688355",
  appId: "1:1076293688355:web:b0afc6e2f22cf6a419e596",
  measurementId: "G-G25ZCGK4YS"};
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Pantau Omzet Multi-Outlet
        const tgl = new Date();
        const pathBase = `${tgl.getFullYear()}/${tgl.getMonth()+1}/${tgl.getDate()}`;

        onValue(ref(db, `penjualan/Sekolah/${pathBase}`), (snap) => {
            let total = 0;
            snap.forEach(c => total += c.val().total);
            document.getElementById('omzetSekolah').innerText = "Rp " + total.toLocaleString();
        });

        onValue(ref(db, `penjualan/Alumni/${pathBase}`), (snap) => {
            let total = 0;
            snap.forEach(c => total += c.val().total);
            document.getElementById('omzetAlumni').innerText = "Rp " + total.toLocaleString();
        });

        // Fitur Export Excel
        window.exportKeExcel = () => {
            // Logika Excel (Sama dengan kode sebelumnya)
            alert("Menyiapkan file Excel Laporan Multi-Outlet...");
        };

        // Fitur Sertifikat Portofolio
        window.generatePortofolio = () => {
            const email = document.getElementById('emailSiswa').value;
            alert("Sistem sedang merangkum data transaksi " + email + " sebagai syarat Sertifikat Kompetensi.");
            window.print(); // Mode print sederhana untuk demo lomba
        };
    </script>
</body>
</html>
